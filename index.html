<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unterrichtsplaner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #1d1d1f;
    color: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
  }

  .icon {
    width: 96px;
    height: 96px;
    background: linear-gradient(145deg, #6e56cf, #8b5cf6);
    border-radius: 22px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(110, 86, 207, 0.4);
  }

  .icon svg {
    width: 48px;
    height: 48px;
    fill: none;
    stroke: white;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
    color: #f5f5f7;
  }

  .subtitle {
    font-size: 0.95rem;
    color: #86868b;
    font-weight: 400;
    margin-bottom: 2.5rem;
    line-height: 1.5;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: #6e56cf;
    color: white;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.9rem 2rem;
    border-radius: 14px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(110, 86, 207, 0.35);
    letter-spacing: -0.01em;
  }

  .btn:hover {
    background: #7c66d5;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(110, 86, 207, 0.45);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: white;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .apps {
    margin-top: 3rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .app-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    font-size: 0.78rem;
    color: #86868b;
  }

  .app-badge svg {
    width: 13px;
    height: 13px;
    fill: none;
    stroke: #86868b;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="container">

  <div class="icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <path d="M3 9h18"/>
      <path d="M9 3v18"/>
    </svg>
  </div>

  <h1>Unterrichtsplaner</h1>
  <p class="subtitle">Stundenplan &amp; Unterrichtsplanung<br>Schulzentrum Oberes Elztal</p>

  <a href="./Web-App/" class="btn">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v8M8 12h8"/>
    </svg>
    App starten
  </a>

  <div class="apps">
    <span class="app-badge">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Web-App
    </span>
    <span class="app-badge">
      <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/></svg>
      iOS-App
    </span>
    <span class="app-badge">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Windows-App
    </span>
  </div>

</div>
</body>
</html>
